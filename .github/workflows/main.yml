name: PHPStan

on: [push, pull_request]

jobs:
  phpstan:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Run PHPStan
        uses: paroxity/pmmp-phpstan-action@5.12.0
        with:
          phpstan-config: phpstan.neon.dist
